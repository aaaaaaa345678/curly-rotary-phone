<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影推荐系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .navbar {
            background: rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(10px);
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .hero {
            padding: 80px 0;
            text-align: center;
            color: white;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .hero p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 40px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
        }
        .form-control, .form-select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 10px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(255,255,255,0.2);
        }
        .form-control::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .form-select option {
            background: #1a1a2e;
            color: white;
        }
        .btn-primary {
            background: linear-gradient(45deg, #e94560, #0f3460);
            border: none;
            border-radius: 10px;
            padding: 12px 40px;
            font-size: 1.1rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233,69,96,0.4);
        }
        .stat-card {
            text-align: center;
            padding: 20px;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label {
            opacity: 0.8;
            font-size: 0.9rem;
        }
        .form-label {
            color: rgba(255,255,255,0.9);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🎬 电影推荐系统</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/compare">算法对比</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <div class="container">
            <h1>🎬 个性化电影推荐系统</h1>
            <p>基于协同过滤算法 · MovieLens数据集 · 943位用户 · 1682部电影</p>

            <div class="row justify-content-center mb-5">
                <div class="col-md-3">
                    <div class="card stat-card">
                        <div class="stat-number">943</div>
                        <div class="stat-label">用户数量</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card">
                        <div class="stat-number">1682</div>
                        <div class="stat-label">电影数量</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card">
                        <div class="stat-number">100K</div>
                        <div class="stat-label">评分数量</div>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card p-4">
                        <h4 class="mb-4 text-center">获取个性化推荐</h4>
                        <form action="/recommend" method="post">
                            <div class="mb-3">
                                <label class="form-label">用户 ID（1 - 943）</label>
                                <input type="number" class="form-control" name="user_id"
                                       placeholder="请输入用户ID，例如：1" min="1" max="943" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">选择推荐算法</label>
                                <select class="form-select" name="algorithm">
                                    <option value="user_cf">User-Based 协同过滤</option>
                                    <option value="item_cf">Item-Based 协同过滤</option>
                                </select>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    🎯 获取推荐
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
